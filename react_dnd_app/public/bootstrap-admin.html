<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Bootstrap Admin</title>
  <style>
    body { background: #0d0b07; color: #d8c8a8; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; gap: 1rem; }
    input { padding: 0.6rem 0.8rem; background: #1a1410; border: 1px solid #4a3420; color: #d8c8a8; border-radius: 4px; font-size: 1rem; width: 280px; }
    button { padding: 0.8rem 2rem; background: rgba(212,168,67,0.15); border: 1px solid #d4a843; color: #d4a843; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { font-size: 0.9rem; color: #7a6a55; max-width: 400px; text-align: center; }
    .success { color: #5db85c !important; font-weight: bold; }
    .error { color: #e06060 !important; }
    form { display: flex; flex-direction: column; gap: 0.6rem; align-items: center; }
  </style>
</head>
<body>
  <h2 style="color:#d4a843;font-family:serif">⚔️ Bootstrap Admin</h2>
  <p style="color:#7a6a55;font-size:0.85rem">Assure-toi que les règles Firestore sont en "allow all" avant de continuer.</p>
  <form onsubmit="run(event)">
    <input id="pseudo" type="text" placeholder="Pseudo" required />
    <input id="password" type="password" placeholder="Mot de passe" required />
    <button type="submit" id="btn">Se connecter et définir Admin</button>
  </form>
  <div id="status">En attente...</div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js'
    import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js'
    import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js'

    const config = {
      apiKey: "AIzaSyDWODnd0Youp3ZaMj06htwSRkqW6aKb0_M",
      authDomain: "dndapp-98ff6.firebaseapp.com",
      projectId: "dndapp-98ff6",
      storageBucket: "dndapp-98ff6.firebasestorage.app",
      messagingSenderId: "1040520433663",
      appId: "1:1040520433663:web:4e00dbe93d8883356fa1ca"
    }

    const app = initializeApp(config)
    const auth = getAuth(app)
    const db = getFirestore(app)

    window.run = async function(e) {
      e.preventDefault()
      const btn = document.getElementById('btn')
      const status = document.getElementById('status')
      btn.disabled = true
      status.textContent = 'Connexion en cours...'
      status.className = ''
      try {
        const pseudo = document.getElementById('pseudo').value.trim().toLowerCase().replace(/\s+/g, '_')
        const email = `${pseudo}@dnd.local`
        const password = document.getElementById('password').value
        const result = await signInWithEmailAndPassword(auth, email, password)
        const user = result.user
        status.textContent = `Connecté : ${user.email} (${user.uid}) — Écriture du rôle admin...`

        const displayName = user.displayName || pseudo
        await setDoc(doc(db, `users/${user.uid}`), {
          role: 'admin',
          pseudo: displayName,
          displayName: displayName
        }, { merge: true })

        status.textContent = `✅ Succès ! "${displayName}" est maintenant admin. Ferme cette page et restaure tes règles Firestore.`
        status.className = 'success'
      } catch (e) {
        status.textContent = `❌ Erreur : ${e.message}`
        status.className = 'error'
        btn.disabled = false
      }
    }
  </script>
</body>
</html>
